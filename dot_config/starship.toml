add_newline = true

format = """[\\[](gray)$os $username[@](gray)$hostname${custom.wsl}[\\]](gray) $directory$git_branch$git_status$cmd_duration$status$line_break$character"""

[character]
success_symbol = "[❯](magenta)"
error_symbol = "[❯](red)"
vicmd_symbol = "[❮](cyan)"

[os]
disabled = false
format = "[$symbol]($style)"
style = "bold cyan"

[os.symbols]
Arch = "󰣇"
Ubuntu = ""
Debian = ""
Macos = ""
Windows = ""
Linux = ""

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold green"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = "bold green"

[custom.wsl]
description = "WSL indicator"
when = '[ -n "$WSL_DISTRO_NAME" ]'
command = 'echo wsl'
format = "[\\(wsl\\)]($style)"
style = "bold yellow"

[directory]
style = "bold blue"
truncation_length = 0
fish_style_pwd_dir_length = 0
truncate_to_repo = false

[git_branch]
format = "[$branch]($style) "
style = "magenta"
symbol = ""

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "gray"
modified = "*"
untracked = "?"
stashed = "≡"
ahead = "⇡"
behind = "⇣"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
min_time = 2000

[line_break]
disabled = false

[status]
disabled = false
symbol = "✘"
format = "[$symbol]($style) "
