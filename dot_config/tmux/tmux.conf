# Minimal, Colemak-aware tmux for long-running Claude Code sessions.
# Read by tmux >= 3.1 from $XDG_CONFIG_HOME/tmux/tmux.conf.

# ---------------------------------------------------------------------------
# Core
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
set -g set-clipboard on

# ---------------------------------------------------------------------------
# Prefix: C-\ (frees C-b for readline; C-\ rarely conflicts with shells/apps)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix 'C-\'
bind 'C-\' send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ---------------------------------------------------------------------------
# Pane navigation: m / n / e / i (Colemak hjkl, matches nvim convention)
# ---------------------------------------------------------------------------
bind m   select-pane -L
bind n   select-pane -D
bind e   select-pane -U
bind i   select-pane -R
bind -r M resize-pane -L 5
bind -r N resize-pane -D 5
bind -r E resize-pane -U 5
bind -r I resize-pane -R 5

# ---------------------------------------------------------------------------
# Splits and new windows preserve $PWD
# ---------------------------------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Copy mode (vi, Colemak-friendly)
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi m send-keys -X cursor-left
bind -T copy-mode-vi n send-keys -X cursor-down
bind -T copy-mode-vi e send-keys -X cursor-up
bind -T copy-mode-vi i send-keys -X cursor-right
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Theme — Catppuccin Mocha (matches wezterm / ghostty / nvim)
# ---------------------------------------------------------------------------
%hidden CMK_BASE="#1e1e2e"
%hidden CMK_TEXT="#cdd6f4"
%hidden CMK_SURFACE0="#313244"
%hidden CMK_SUBTEXT0="#a6adc8"
%hidden CMK_MAUVE="#cba6f7"
%hidden CMK_BLUE="#89b4fa"
%hidden CMK_LAVENDER="#b4befe"

set -g status-style "bg=$CMK_BASE,fg=$CMK_TEXT"
set -g status-left  "#[bg=$CMK_MAUVE,fg=$CMK_BASE,bold]  #S "
set -g status-left-length 40
set -g status-right "#[fg=$CMK_SUBTEXT0]#h #[fg=$CMK_LAVENDER]%H:%M "
set -g status-right-length 60

set -g window-status-current-format "#[bg=$CMK_BLUE,fg=$CMK_BASE,bold] #I:#W "
set -g window-status-format         "#[fg=$CMK_SUBTEXT0] #I:#W "
set -g window-status-separator ""

set -g pane-border-style        "fg=$CMK_SURFACE0"
set -g pane-active-border-style "fg=$CMK_MAUVE"
set -g message-style            "bg=$CMK_SURFACE0,fg=$CMK_TEXT"
