name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MISE_VERSION: v2026.7.5

jobs:
  static:
    name: pins, lock, formats, and removals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: validate manifest and repository invariants
        run: |
          python3 scripts/ci/validate-mise.py
          python3 scripts/ci/validate-repository.py
          mise trust mise.toml
          mise tasks validate

      - name: install pinned linters
        run: mise install --locked shellcheck shfmt taplo

      - name: lint shell and TOML
        run: |
          shellcheck_bin="$(mise which shellcheck)"
          shfmt_bin="$(mise which shfmt)"
          taplo_bin="$(mise which taplo)"
          mapfile -t shell_files < <(find scripts -type f -name '*.sh' -print | sort)
          mapfile -t toml_files < <(find . -type f -name '*.toml' -not -path './.git/*' -print | sort)
          shell_files+=(install.sh dot_local/bin/executable_op dot_local/bin/executable_ssh dot_local/bin/executable_ssh-add)
          "$shellcheck_bin" -e SC1091 -S warning "${shell_files[@]}"
          "$shfmt_bin" -i 2 -ci -d "${shell_files[@]}"
          "$taplo_bin" lint "${toml_files[@]}"
          "$taplo_bin" format --check mise.toml mise.lock

  locked-dry-run:
    name: locked dry-run (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            arch: X64
          - name: macos-arm64
            os: macos-15
            arch: ARM64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: assert runner architecture
        run: test "$RUNNER_ARCH" = "${{ matrix.arch }}"

      - name: install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: resolve every tool from mise.lock
        env:
          MISE_CONFIG_DIR: ${{ runner.temp }}/mise-config
        run: |
          mise trust mise.toml
          mise install --locked --dry-run

  intel-fallback:
    name: Intel Mac source fallbacks
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: assert Intel runner
        run: test "$RUNNER_ARCH" = X64

      - name: install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: verify Cargo and npm fallbacks
        env:
          MISE_CONFIG_DIR: ${{ runner.temp }}/mise-config
        run: |
          mise trust mise.toml
          mise install --locked --dry-run 2>&1 | tee "$RUNNER_TEMP/install-plan"
          for tool in cargo:sheldon cargo:git-delta cargo:fd-find cargo:atuin npm:pnpm; do
            grep -F "$tool" "$RUNNER_TEMP/install-plan"
          done

      - name: install pnpm through the Intel fallback
        env:
          MISE_CONFIG_DIR: ${{ runner.temp }}/mise-config
        run: |
          mise install --locked node npm:pnpm
          node_dir="$(dirname "$(mise which node)")"
          pnpm_bin="$(mise which pnpm)"
          test "$(PATH="$node_dir:$PATH" "$pnpm_bin" --version)" = 11.16.0

  package-bootstrap:
    name: packages (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fedora
            image: fedora:44@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
          - name: Arch
            image: archlinux:base-devel
    container:
      image: ${{ matrix.image }}
    steps:
      - name: prepare Fedora container
        if: matrix.name == 'Fedora'
        run: dnf install -y --setopt=install_weak_deps=False git curl ca-certificates tar gzip

      - name: prepare Arch container
        if: matrix.name == 'Arch'
        run: pacman -Syu --needed --noconfirm git curl ca-certificates tar gzip

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: apply and verify bootstrap packages
        run: |
          mise trust mise.toml
          mise bootstrap packages apply --yes
          mise bootstrap packages status --missing

  chezmoi-dry-run:
    name: chezmoi dry-run (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install mise and chezmoi
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mise" trust mise.toml
          "$HOME/.local/bin/mise" install --locked chezmoi

      - name: render and apply without externals
        run: |
          chezmoi_bin="$(mise which chezmoi)"
          destination="$RUNNER_TEMP/chezmoi-destination"
          mkdir -p "$destination"
          "$chezmoi_bin" --source "$PWD" init
          "$chezmoi_bin" --source "$PWD" --destination "$destination" \
            apply --dry-run --verbose --exclude=externals
          "$chezmoi_bin" --source "$PWD" execute-template \
            < dot_claude/settings.json.tmpl \
            | python3 -m json.tool > /dev/null
