name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # chezmoi apply --dry-run across ubuntu / macos / windows. ubuntu acts as a
  # generic-Linux proxy here; the actual Fedora install path is covered in
  # fedora-bootstrap below. apply --dry-run renders every template, so a
  # separate template-only job would be redundant.
  # ---------------------------------------------------------------------------
  apply-dry-run:
    name: apply --dry-run (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install chezmoi (linux)
        if: runner.os == 'Linux'
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: install chezmoi (macos)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install chezmoi

      - name: install chezmoi (windows)
        if: runner.os == 'Windows'
        run: choco install chezmoi -y --no-progress

      - name: chezmoi init (generate config with default feature flags)
        if: runner.os != 'Windows'
        run: chezmoi --source "$PWD" init --promptDefaults

      - name: chezmoi init (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: chezmoi --source "$PWD" init --promptDefaults

      - name: chezmoi apply --dry-run (unix)
        if: runner.os != 'Windows'
        run: |
          dest="$RUNNER_TEMP/cm-dest"
          mkdir -p "$dest"
          chezmoi --source "$PWD" --destination "$dest" \
            apply --dry-run --verbose --exclude=externals

      - name: chezmoi apply --dry-run (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "cm-dest"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          chezmoi --source "$PWD" --destination $dest `
            apply --dry-run --verbose --exclude=externals

  # ---------------------------------------------------------------------------
  # Real bootstrap on Fedora — runs `bash scripts/install-linux.sh` inside a
  # Fedora container, then verifies dnf packages + ~/.local/bin/{chezmoi,mise}.
  # ---------------------------------------------------------------------------
  fedora-bootstrap:
    name: bootstrap on Fedora container
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    timeout-minutes: 15
    steps:
      - name: container prerequisites
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            git curl sudo shadow-utils util-linux which findutils tar gzip
      - uses: actions/checkout@v4

      - name: run scripts/install-linux.sh
        run: bash scripts/install-linux.sh

      - name: install mise bootstrap packages
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi --source "$PWD" init --promptDefaults
          mkdir -p "$HOME/.config/mise"
          chezmoi --source "$PWD" execute-template --init \
            < dot_config/mise/config.toml.tmpl \
            > "$HOME/.config/mise/config.toml"
          mise bootstrap packages install --yes

      - name: verify dnf packages installed
        run: |
          missing=0
          for pkg in zsh vim-enhanced git openssh-clients curl \
                    ca-certificates unzip fontconfig gcc gcc-c++ make \
                    google-noto-sans-cjk-fonts google-noto-serif-cjk-fonts; do
            if ! rpm -q "$pkg" >/dev/null 2>&1; then
              echo "::error::missing dnf package: $pkg"
              missing=$((missing+1))
            fi
          done
          exit "$missing"

      - name: verify chezmoi + mise bootstrap into ~/.local/bin
        run: |
          test -x "$HOME/.local/bin/chezmoi"
          test -x "$HOME/.local/bin/mise"

      - name: chezmoi init + apply --dry-run
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi --source "$PWD" init --promptDefaults
          dest="$RUNNER_TEMP/cm-dest"
          mkdir -p "$dest"
          chezmoi --source "$PWD" --destination "$dest" \
            apply --dry-run --verbose --exclude=externals

  # ---------------------------------------------------------------------------
  # shellcheck the install-linux.sh script and rendered run_onchange_*.sh
  # templates. Uses chezmoi init + execute-template to fill `.features.*` etc.
  # ---------------------------------------------------------------------------
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install chezmoi + shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends shellcheck
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: render shell templates and lint
        run: |
          set -eu
          chezmoi --source "$PWD" init --promptDefaults
          mkdir -p .rendered
          for f in run_onchange_*.sh.tmpl; do
            [[ -f "$f" ]] || continue
            out=".rendered/${f%.tmpl}"
            chezmoi execute-template --init --source "$PWD" < "$f" > "$out" || true
            [[ -s "$out" ]] || rm -f "$out"
          done
          targets=()
          for s in scripts/*.sh; do
            [[ -f "$s" ]] && targets+=("$s")
          done
          for r in .rendered/*.sh; do
            [[ -f "$r" ]] && targets+=("$r")
          done
          if [[ ${#targets[@]} -gt 0 ]]; then
            shellcheck -e SC1091 -S warning "${targets[@]}"
          fi
