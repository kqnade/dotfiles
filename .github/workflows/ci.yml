name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  templates:
    name: render templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: render every *.tmpl
        run: |
          set -eu
          fail=0
          while IFS= read -r f; do
            echo "::group::$f"
            if ! chezmoi execute-template --source "$PWD" < "$f" >/dev/null; then
              echo "::error file=$f::template render failed"
              fail=1
            fi
            echo "::endgroup::"
          done < <(find . -name '*.tmpl' -not -path './.git/*' | sort)
          exit "$fail"

  apply-dry-run:
    name: apply --dry-run (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install chezmoi (linux)
        if: runner.os == 'Linux'
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: install chezmoi (macos)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install chezmoi

      - name: install chezmoi (windows)
        if: runner.os == 'Windows'
        run: choco install chezmoi -y --no-progress

      - name: dry-run apply (unix)
        if: runner.os != 'Windows'
        run: |
          dest="$RUNNER_TEMP/cm-dest"
          mkdir -p "$dest"
          chezmoi --source "$PWD" --destination "$dest" \
            apply --dry-run --verbose --exclude=externals

      - name: dry-run apply (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "cm-dest"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          chezmoi --source "$PWD" --destination $dest `
            apply --dry-run --verbose --exclude=externals

  non-sudo-linux:
    name: non-sudo install path (pixi)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_NOSUDO: "1"
      PIXI_HOME: ${{ github.workspace }}/.pixi-home
      PIXI_CACHE_DIR: /tmp/pixi-cache
    steps:
      - uses: actions/checkout@v4

      - name: cache pixi envs
        uses: actions/cache@v4
        with:
          path: ${{ env.PIXI_HOME }}
          key: pixi-${{ runner.os }}-${{ hashFiles('scripts/install-linux.sh') }}
          restore-keys: |
            pixi-${{ runner.os }}-

      - name: run scripts/install-linux.sh
        run: bash scripts/install-linux.sh

      - name: verify installed binaries
        run: |
          set -eu
          export PATH="$PIXI_HOME/bin:$HOME/.local/bin:$PATH"
          missing=0
          for cmd in \
            chezmoi sheldon starship \
            ghq gh glab delta \
            eza rg fd bat fzf \
            nvim vim \
            gpg gpg-agent gpgconf pinentry \
            gomi cargo rustc \
            pass; do
            if command -v "$cmd" >/dev/null 2>&1; then
              printf '✓ %-12s → %s\n' "$cmd" "$(command -v "$cmd")"
            else
              echo "::error::missing $cmd in PATH"
              missing=$((missing + 1))
            fi
          done
          exit "$missing"

  shellcheck:
    name: shellcheck (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install chezmoi + shellcheck
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends shellcheck
            sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          else
            brew install shellcheck chezmoi
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: render shell templates and lint
        shell: bash
        run: |
          set -eu
          mkdir -p .rendered
          for f in run_onchange_*.sh.tmpl; do
            [[ -f "$f" ]] || continue
            out=".rendered/${f%.tmpl}"
            chezmoi execute-template --source "$PWD" < "$f" > "$out"
            if [[ ! -s "$out" ]]; then
              rm -f "$out"
            fi
          done

          targets=()
          for s in scripts/*.sh; do
            [[ -f "$s" ]] && targets+=("$s")
          done
          for r in .rendered/*.sh; do
            [[ -f "$r" ]] && targets+=("$r")
          done
          if [[ ${#targets[@]} -gt 0 ]]; then
            shellcheck -e SC1091 -S warning "${targets[@]}"
          else
            echo "no shell targets to lint on $RUNNER_OS"
          fi
