#:schema https://mise.jdx.dev/schema/mise.json

min_version = "2026.7.12"

[settings]
activate_aggressive = true
experimental = true
lockfile = true
lockfile_platforms = ["macos-arm64", "macos-x64", "linux-x64"]
# Intel macOS installs npm:pnpm, so using pnpm here would create a bootstrap
# cycle. Node's pinned npm installs all npm-backed tools instead.
npm.package_manager = "npm"
system_packages.managers = ["dnf", "pacman"]
task.run_auto_install = false

[tools]
# Bootstrap and shell
chezmoi = "2.71.1"
sheldon = { version = "0.8.5", os = ["linux", "macos/arm64"] }
"cargo:sheldon" = { version = "0.8.5", os = ["macos/x64"], depends = ["rust"] }
starship = "1.26.0"
gh = "2.96.0"
ghq = "1.10.1"
git-lfs = "3.7.1"
delta = { version = "0.19.2", os = ["linux", "macos/arm64"] }
"cargo:git-delta" = { version = "0.19.2", os = [
  "macos/x64",
], depends = [
  "rust",
] }

# Daily CLI tools
"cargo:eza" = { version = "0.23.5", depends = ["rust"] }
fzf = "0.74.1"
fd = { version = "10.4.2", os = ["linux", "macos/arm64"] }
"cargo:fd-find" = { version = "10.4.2", os = ["macos/x64"], depends = ["rust"] }
ripgrep = "15.2.0"
bat = "0.26.1"
zoxide = "0.10.0"
jq = "1.8.2"
yq = "4.53.3"
just = "1.57.0"
atuin = { version = "18.17.1", os = ["linux", "macos/arm64"] }
"cargo:atuin" = { version = "18.17.1", os = ["macos/x64"], depends = ["rust"] }
"aqua:babarot/gomi" = "1.6.4"
btop = { version = "1.4.6", os = ["linux"] }

# Editor and source validation
neovim = "0.12.4"
tree-sitter = "0.26.11"
shellcheck = "0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
typos = "1.48.0"

# Language runtimes
rust = "1.97.1"
node = "24.18.0"
bun = "1.3.14"
pnpm = { version = "11.16.0", os = [
  "linux",
  "macos/arm64",
], depends = [
  "node",
] }
"npm:pnpm" = { version = "11.16.0", os = ["macos/x64"], depends = ["node"] }
uv = "0.11.31"

# Agent and application CLIs
1password-cli = "2.35.0"
herdr = "0.7.5"
claude = "2.1.218"
codex = { version = "0.145.0", depends = ["node"] }
opencode = "1.18.4"
"npm:ccusage" = { version = "20.0.18", depends = ["node"] }

# SKK server and dictionary builder. Keep this on the Cargo git backend on
# every platform so the service behaves identically on macOS and Linux.
"cargo:https://github.com/wachikun/yaskkserv2" = { version = "tag:0.1.7", depends = [
  "rust",
] }

[bootstrap.packages]
# Fedora
"dnf:zsh" = "latest"
"dnf:git" = "latest"
"dnf:openssh-clients" = "latest"
"dnf:gcc" = "latest"
"dnf:gcc-c++" = "latest"
"dnf:make" = "latest"
"dnf:fontconfig" = "latest"
"dnf:google-noto-sans-cjk-fonts" = "latest"
"dnf:google-noto-serif-cjk-fonts" = "latest"
"dnf:curl" = "latest"
"dnf:ca-certificates" = "latest"
"dnf:unzip" = "latest"

# Arch Linux
"pacman:zsh" = "latest"
"pacman:git" = "latest"
"pacman:openssh" = "latest"
"pacman:base-devel" = "latest"
"pacman:fontconfig" = "latest"
"pacman:noto-fonts-cjk" = "latest"
"pacman:curl" = "latest"
"pacman:ca-certificates" = "latest"
"pacman:unzip" = "latest"

[bootstrap.user]
login_shell = "/bin/zsh"

[bootstrap.macos.dock]
autohide = true
magnification = true
largesize = 61
tilesize = 26
orientation = "left"
show_recents = false
mru_spaces = false

[bootstrap.macos.finder]
show_all_files = true
show_pathbar = true
show_status_bar = true
show_extensions_warning = false
preferred_view_style = "icon"

[bootstrap.macos.keyboard]
key_repeat = 2
initial_key_repeat = 15
press_and_hold = false
fn_state = true

[bootstrap.macos.trackpad]
tap_to_click = true

[bootstrap.macos.defaults.NSGlobalDomain]
AppleShowAllExtensions = true
AppleMiniaturizeOnDoubleClick = false
AppleActionOnDoubleClick = "Minimize"
AppleMenuBarVisibleInFullscreen = false
AppleReduceDesktopTinting = true
"com.apple.trackpad.scaling" = 1.5
"com.apple.trackpad.forceClick" = true
AppleKeyboardUIMode = 3
NSNavPanelExpandedStateForSaveMode = true
NSNavPanelExpandedStateForSaveMode2 = true
NSDocumentSaveNewDocumentsToCloud = false

[bootstrap.macos.defaults."com.apple.dock"]
mineffect = "genie"
showAppExposeGestureEnabled = false
showLaunchpadGestureEnabled = true
expose-group-apps = false

[bootstrap.macos.defaults."com.apple.finder"]
FXRemoveOldTrashItems = true
NewWindowTarget = "PfHm"
ShowExternalHardDrivesOnDesktop = true
ShowHardDrivesOnDesktop = false
ShowMountedServersOnDesktop = true
ShowRemovableMediaOnDesktop = true
_FXSortFoldersFirst = true
FXDefaultSearchScope = "SCcf"
_FXShowPosixPathInTitle = true
FXArrangeGroupViewBy = "Name"

[bootstrap.macos.defaults."com.apple.menuextra.clock"]
ShowAMPM = true
ShowDate = 0
ShowDayOfWeek = true

[bootstrap.macos.defaults."com.apple.WindowManager"]
GloballyEnabled = false
HideDesktop = true

[bootstrap.macos.defaults."com.apple.ncprefs"]
summarize_previews = 0

[bootstrap.macos.defaults."com.apple.screencapture"]
type = "png"
disable-shadow = true

[bootstrap.macos.defaults."com.apple.TextEdit"]
RichText = 0
PlainTextEncoding = 4
PlainTextEncodingForWrite = 4

[bootstrap.macos.launchd.agents.yaskkserv2]
program = "~/repos/github.com/kqnade/dotfiles/scripts/yaskkserv2-serve.sh"
run_at_load = true
keep_alive = true
kickstart = true
stdout_path = "~/Library/Logs/yaskkserv2.log"
stderr_path = "~/Library/Logs/yaskkserv2.err"

[bootstrap.linux.systemd.units.yaskkserv2]
description = "Local SKK dictionary server"
exec_start = "~/repos/github.com/kqnade/dotfiles/scripts/yaskkserv2-serve.sh"
after = ["network.target"]
restart = "on-failure"
restart_sec = "2s"
standard_output = "journal"
standard_error = "journal"

[bootstrap.hooks.pre-packages]
run = "bash \"${DOTFILES_ROOT:-$HOME/repos/github.com/kqnade/dotfiles}/scripts/remove-legacy-yaskkserv2.sh\""

[bootstrap.hooks.post-defaults]
run = "bash \"${DOTFILES_ROOT:-$HOME/repos/github.com/kqnade/dotfiles}/scripts/macos-finalize.sh\""

[tasks.apply]
description = "Apply chezmoi-managed dotfiles"
run = "bash \"${DOTFILES_ROOT:-$HOME/repos/github.com/kqnade/dotfiles}/scripts/apply.sh\""

[tasks.bootstrap]
description = "Finish idempotent machine setup after tools are installed"
run = "bash \"${DOTFILES_ROOT:-$HOME/repos/github.com/kqnade/dotfiles}/scripts/bootstrap.sh\""

[tasks.doctor]
description = "Diagnose tools, packages, dotfiles, fonts, and services"
run = "bash \"${DOTFILES_ROOT:-$HOME/repos/github.com/kqnade/dotfiles}/scripts/doctor.sh\""

[tasks.update]
description = "Update explicit tool pins and all lockfile platforms"
run = "bash \"${DOTFILES_ROOT:-$HOME/repos/github.com/kqnade/dotfiles}/scripts/update.sh\""
